{% extends 'base.html' %}

{% block content %}

<!-- Header -->
<div class="mb-8">
    <a href="/" class="text-gray-400 hover:text-white text-sm transition">← Back to Dashboard</a>
    <h1 class="text-3xl font-bold text-white mt-3">Add New Item</h1>
    <p class="text-gray-400 mt-1">Add a new stock item to track</p>
</div>

<!-- Form -->
<div class="max-w-lg bg-dark-800 rounded-xl border border-gray-700 p-8">
    <form method="POST" action="/add-item">

        <!-- Item name -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Item Name</label>
            <input
                type="text"
                name="name"
                placeholder="e.g. Tomatoes"
                required
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
        </div>

        <!-- Unit -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Unit of Measurement</label>
            <input
                type="text"
                name="unit"
                placeholder="e.g. kg, litres, units"
                required
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
        </div>

        <!-- Current stock -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Current Stock</label>
            <input
                type="number"
                name="current_stock"
                placeholder="e.g. 20"
                step="0.1"
                min="0"
                required
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
        </div>

        <!-- Low threshold -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-300 mb-2">Low Stock Alert Threshold</label>
            <input
                type="number"
                name="low_threshold"
                placeholder="e.g. 5"
                step="0.1"
                min="0"
                required
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
            <p class="text-gray-500 text-sm mt-2">You will be alerted when stock drops below this level</p>
        </div>

        <!-- Submit -->
        <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition">
            Add Item
        </button>

    </form>
</div>

{% endblock %}
