{% extends 'base.html' %}

{% block content %}

<!-- Header -->
<div class="mb-8">
    <a href="/" class="text-gray-400 hover:text-white text-sm transition">← Back to Dashboard</a>
    <h1 class="text-3xl font-bold text-white mt-3">Log Usage</h1>
    <p class="text-gray-400 mt-1">Record how much {{ item.name }} was used</p>
</div>

<!-- Current stock info -->
<div class="max-w-lg bg-dark-800 rounded-xl border border-gray-700 p-6 mb-6">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-gray-400 text-sm">Current Stock</p>
            <p class="text-3xl font-bold text-white mt-1">
                {{ item.current_stock }} <span class="text-lg text-gray-400">{{ item.unit }}</span>
            </p>
        </div>
        <div class="text-right">
            <p class="text-gray-400 text-sm">Alert Threshold</p>
            <p class="text-xl font-semibold text-amber-400 mt-1">
                {{ item.low_threshold }} {{ item.unit }}
            </p>
        </div>
    </div>
</div>

<!-- Form -->
<div class="max-w-lg bg-dark-800 rounded-xl border border-gray-700 p-8">
    <form method="POST" action="/log-usage/{{ item.id }}">

        <!-- Quantity used -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">
                Quantity Used ({{ item.unit }})
            </label>
            <input
                type="number"
                name="quantity_used"
                placeholder="e.g. 2.5"
                step="0.1"
                min="0.1"
                required
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
        </div>

        <!-- Logged by -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-300 mb-2">Your Name (optional)</label>
            <input
                type="text"
                name="logged_by"
                placeholder="e.g. John"
                class="w-full bg-dark-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
            <p class="text-gray-500 text-sm mt-2">Used for audit trail only</p>
        </div>

        <!-- Submit -->
        <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition">
            Log Usage
        </button>

    </form>
</div>

{% endblock %}
